<section class="contact-form">

    <h2>Contact / Feedback Form</h2>

    <form action="#" method="post">

        <div class="form-question">
            <label for="name">1. Name:</label>
            <input type="text" id="name" name="name" placeholder="Your full name">
        </div>

        <div class="form-question">
            <label for="email">2. Email:</label>
            <input type="email" id="email" name="email" placeholder="Your email">
        </div>

        <div class="form-question">
            <label for="subject">3. Subject:</label>
            <input type="text" id="subject" name="subject" placeholder="Subject of your message">
        </div>

        <div class="form-question">
            <label for="message">4. Message:</label>
            <textarea id="message" name="message" placeholder="Write your message here..."></textarea>
        </div>

        <div class="form-question">
            <label for="rating">5. Rate your experience:</label>
            <select id="rating" name="rating">
                <option value="">Select</option>
                <option value="excellent">Excellent</option>
                <option value="good">Good</option>
                <option value="average">Average</option>
                <option value="poor">Poor</option>
            </select>
        </div>

        <div class="form-question">
            <label for="favorite-spot">6. Favorite place in Dallas:</label>
            <input type="text" id="favorite-spot" name="favorite-spot" placeholder="Your favorite attraction">
        </div>

        <div class="form-question">
            <label for="suggestions">7. Suggestions / Ideas:</label>
            <textarea id="suggestions" name="suggestions" placeholder="Any suggestions or ideas?"></textarea>
        </div>

        <button type="submit">Submit</button>

    </form>

</section>
